disabled_rules:
  - trailing_whitespace
  - identifier_name
opt_in_rules:
  - sorted_imports
  - attributes
  - closure_end_indentation
  - convenience_type
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - nimble_operator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - single_test_class
  - switch_case_on_newline
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition
analyzer_rules:
  - unused_import
  - unused_declaration
included:
  - PokemonChallenge
  - PokemonChallengeTests
excluded:
  - DerivedData
line_length: 140
file_length: 400
type_body_length: 300
function_body_length: 60
cyclomatic_complexity: 12
